<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minha Despensa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f0e8;--paper:#fffdf8;--ink:#2b2620;--muted:#8a8175;--line:#e4ddcf;
    --green:#3f7d52;--red:#bb4a3c;--red-soft:#f7e4e0;--amber:#c2862a;--amber-soft:#f6ecd8;
    --accent:#b5552d;--shadow:0 1px 2px rgba(43,38,32,.06),0 8px 24px rgba(43,38,32,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;line-height:1.5;
    padding-bottom:90px;background-image:radial-gradient(circle at 1px 1px,rgba(43,38,32,.04) 1px,transparent 0);
    background-size:22px 22px;
  }
  header{padding:24px 20px 14px;max-width:760px;margin:0 auto}
  .toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  h1{font-family:'Fraunces',serif;font-weight:700;font-size:32px;margin:0;letter-spacing:-.5px}
  .tag{font-size:13px;color:var(--muted);margin:2px 0 0}
  .userbox{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);flex:none}
  .userbox img{width:30px;height:30px;border-radius:50%;border:1px solid var(--line)}
  .userbox .av{width:30px;height:30px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .logout{border:none;background:transparent;color:var(--accent);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;text-decoration:underline}
  .wrap{max-width:760px;margin:0 auto;padding:0 20px}

  .summary{display:flex;gap:12px;margin:8px 0 20px}
  .stat{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)}
  .stat .n{font-family:'Fraunces',serif;font-size:28px;font-weight:600;line-height:1}
  .stat .l{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  .stat.alert .n{color:var(--red)}

  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;border:1px solid var(--line);background:var(--paper);border-radius:12px;padding:11px;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .tab .badge{background:var(--red);color:#fff;font-size:11px;border-radius:20px;padding:1px 7px;font-weight:700}
  .tab.active .badge{background:var(--accent)}

  .panel{display:none;animation:fade .25s ease}
  .panel.show{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .additem{display:flex;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:8px;margin-bottom:12px;box-shadow:var(--shadow);flex-wrap:wrap}
  .additem input{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--ink);padding:8px 10px;outline:none;min-width:120px}
  .additem select{border:1px solid var(--line);background:var(--bg);border-radius:10px;font-family:inherit;font-size:14px;color:var(--ink);padding:0 8px;outline:none}
  .additem button{border:none;background:var(--green);color:#fff;border-radius:10px;width:42px;height:42px;font-size:22px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;transition:.15s}
  .additem button:active{transform:scale(.92)}

  .filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
  .filters::-webkit-scrollbar{display:none}
  .chip{border:1px solid var(--line);background:var(--paper);border-radius:20px;padding:6px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;flex:none;transition:.12s}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  .catgroup{margin-bottom:18px}
  .catlabel{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--muted);margin:0 0 8px 4px;display:flex;align-items:center;gap:7px}
  .catlabel .ic{font-size:17px}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
  .card.out{border-color:var(--red);background:linear-gradient(0deg,var(--red-soft),var(--paper))}
  .card.low{border-color:var(--amber)}
  .info{flex:1;min-width:0}
  .name{font-weight:600;font-size:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
  .pill.out{background:var(--red);color:#fff}.pill.low{background:var(--amber-soft);color:var(--amber)}
  .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .qty{display:flex;align-items:center;gap:4px;flex:none}
  .qbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--bg);font-size:18px;font-weight:600;cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;transition:.12s}
  .qbtn:active{transform:scale(.9)}.qbtn.minus{color:var(--red)}.qbtn.plus{color:var(--green)}
  .qnum{min-width:34px;text-align:center;font-family:'Fraunces',serif;font-size:20px;font-weight:600}
  .del{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;flex:none;opacity:.6}
  .del:active{opacity:1}

  .checkitem{cursor:pointer}
  .checkitem.done .name{text-decoration:line-through;color:var(--muted)}
  .check{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;transition:.15s}
  .checkitem.done .check{background:var(--green);border-color:var(--green)}
  .auto-tag{font-size:10px;font-weight:700;color:var(--accent);background:#f3e3d8;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}

  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .em{font-size:42px;margin-bottom:8px}.empty p{margin:4px 0;font-size:14px}
  .clearbtn{width:100%;border:1px dashed var(--line);background:transparent;color:var(--muted);border-radius:12px;padding:12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}

  .price-row{display:flex;align-items:center;gap:6px;margin-top:8px}
  .price-row .lbl{font-size:12px;color:var(--muted)}
  .price-in{border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:6px 10px;font-family:inherit;font-size:14px;color:var(--ink);outline:none;width:110px}
  .price-in:focus{border-color:var(--accent)}
  .lastpaid{font-size:11px;color:var(--accent);background:#f3e3d8;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
  .listcard{flex-wrap:wrap}
  .listcard .toprow2{display:flex;align-items:center;gap:12px;width:100%}

  .finishbtn{width:100%;border:none;background:var(--green);color:#fff;border-radius:14px;padding:16px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;box-shadow:var(--shadow);transition:.15s}
  .finishbtn:active{transform:scale(.98)}
  .finishbtn .sum{font-weight:500;opacity:.9;font-size:14px}

  .histtotal{background:var(--ink);color:var(--paper);border-radius:16px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
  .histtotal .big{font-family:'Fraunces',serif;font-size:32px;font-weight:700;line-height:1}
  .histtotal .lbl{font-size:12px;opacity:.75;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .histcard{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .histcard .hh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .histcard .date{font-weight:600;font-size:15px}
  .histcard .tot{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--green)}
  .histcard .items{font-size:13px;color:var(--muted);line-height:1.7}
  .histcard .items .it{display:flex;justify-content:space-between;border-bottom:1px dashed var(--line);padding:3px 0}
  .histcard .items .it:last-child{border:none}
  .histcard .delh{border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;text-decoration:underline;font-family:inherit;margin-top:8px;opacity:.7}
  .monthhead{display:flex;justify-content:space-between;align-items:baseline;margin:18px 4px 10px;padding-bottom:6px;border-bottom:2px solid var(--line)}
  .monthhead span:first-child{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
  .monthhead .msum{font-weight:700;color:var(--accent);font-size:15px}
  .monthhead:first-child{margin-top:0}

  /* dashboard */
  .dashcards{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .dashcards .dc{flex:1;min-width:140px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
  .dashcards .dc .v{font-family:'Fraunces',serif;font-size:26px;font-weight:600;line-height:1}
  .dashcards .dc .k{font-size:12px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
  .dashcards .dc.accent .v{color:var(--accent)}
  .dashcards .dc .trend{font-size:12px;font-weight:600;margin-top:6px}
  .trend.up{color:var(--red)}.trend.down{color:var(--green)}.trend.flat{color:var(--muted)}

  .chartbox{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:20px 18px 14px;box-shadow:var(--shadow);margin-bottom:20px}
  .chartbox h3{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0 0 18px}
  .chart{display:flex;align-items:flex-end;gap:10px;height:180px;overflow-x:auto;padding-bottom:4px}
  .chart::-webkit-scrollbar{height:6px}.chart::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
  .bar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;min-width:42px;height:100%}
  .bar-val{font-size:11px;font-weight:600;color:var(--ink);margin-bottom:5px;white-space:nowrap}
  .bar{width:100%;max-width:46px;background:linear-gradient(180deg,var(--accent),#d98a5e);border-radius:8px 8px 0 0;transition:height .5s cubic-bezier(.2,.9,.3,1);min-height:3px}
  .bar.cur{background:linear-gradient(180deg,var(--green),#5fa372)}
  .bar-lbl{font-size:11px;color:var(--muted);margin-top:7px;white-space:nowrap;text-align:center}

  .topbox{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:20px 18px;box-shadow:var(--shadow)}
  .topbox h3{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0 0 14px}
  .toprow3{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .toprow3:last-child{border:none}
  .toprow3 .rank{width:24px;height:24px;border-radius:50%;background:var(--bg);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);margin-right:10px;flex:none}
  .toprow3 .pname{flex:1;font-weight:500}
  .toprow3 .pval{font-weight:700;color:var(--accent)}

  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);background:var(--ink);color:var(--paper);padding:13px 20px;border-radius:14px;font-size:14px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:50;transition:transform .35s cubic-bezier(.2,.9,.3,1.3);max-width:90%;display:flex;align-items:center;gap:9px}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast .dot{width:9px;height:9px;border-radius:50%;background:var(--red);flex:none}

  /* login */
  #login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;background-image:radial-gradient(circle at 1px 1px,rgba(43,38,32,.04) 1px,transparent 0);background-size:22px 22px}
  .loginbox{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:34px 28px;box-shadow:var(--shadow);max-width:380px;width:100%;text-align:center}
  .loginbox .em{font-size:48px}
  .loginbox h1{font-size:30px;margin:10px 0 4px}
  .loginbox p{color:var(--muted);font-size:14px;margin:0 0 22px}
  .loginbox input{width:100%;border:1px solid var(--line);background:var(--bg);border-radius:12px;padding:13px 14px;font-family:inherit;font-size:15px;margin-bottom:10px;outline:none}
  .btn{width:100%;border:none;border-radius:12px;padding:14px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:9px}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--ink);color:var(--paper)}
  .btn.google{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--accent);font-size:13px;text-decoration:underline;padding:6px}
  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:14px 0}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
  #loginErr{color:var(--red);font-size:13px;min-height:18px;margin-bottom:6px}
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .hidden{display:none!important}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="loginbox">
    <div class="em">🧺</div>
    <h1>Minha Despensa</h1>
    <p>Entre para ver e compartilhar seu estoque</p>
    <div id="loginErr"></div>
    <button class="btn google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.2 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-3.9 6.7-9.7 6.7-17.4z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.3-5.7c-2 1.4-4.6 2.2-8.6 2.2-6.4 0-11.7-3.7-13.6-9.1l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
      Continuar com Google
    </button>
    <div class="divider">ou e-mail</div>
    <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
    <input id="pass" type="password" placeholder="senha (mín. 6 caracteres)" autocomplete="current-password">
    <button class="btn primary" id="emailBtn">Entrar</button>
    <button class="btn ghost" id="toggleMode">Não tem conta? Criar conta</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
<header>
  <div class="toprow">
    <div>
      <h1>Minha Despensa</h1>
      <p class="tag">Estoque & lista de compras • sincronizado</p>
    </div>
    <div class="userbox">
      <span id="userAv"></span>
      <button class="logout" id="logoutBtn">sair</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="summary">
    <div class="stat"><div class="n" id="stTotal">0</div><div class="l">Produtos</div></div>
    <div class="stat alert"><div class="n" id="stOut">0</div><div class="l">Sem estoque</div></div>
    <div class="stat"><div class="n" id="stList">0</div><div class="l">Na lista</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="stock">🏠 Estoque</button>
    <button class="tab" data-tab="list">🛒 Compras <span class="badge" id="listBadge" style="display:none">0</span></button>
    <button class="tab" data-tab="hist">🧾 Histórico</button>
    <button class="tab" data-tab="dash">📊 Painel</button>
  </div>

  <section class="panel show" id="panelStock">
    <div class="additem">
      <input id="addName" type="text" placeholder="Produto (ex: Arroz)" maxlength="40">
      <select id="addCat"></select>
      <button id="addBtn">+</button>
    </div>
    <div class="additem" style="margin-bottom:14px">
      <input id="newCat" type="text" placeholder="Nova categoria…" maxlength="24">
      <button id="newCatBtn" style="background:var(--accent)">+</button>
    </div>
    <div class="filters" id="filters"></div>
    <div id="stockList"></div>
  </section>

  <section class="panel" id="panelList">
    <div class="additem">
      <input id="addListName" type="text" placeholder="Adicionar item à lista" maxlength="40">
      <button id="addListBtn">+</button>
    </div>
    <div id="shopList"></div>
    <button class="finishbtn" id="finishBtn" style="display:none">✓ Finalizar compras de hoje</button>
  </section>

  <section class="panel" id="panelHist">
    <div class="histtotal" id="histTotal"></div>
    <div id="histList"></div>
  </section>

  <section class="panel" id="panelDash">
    <div class="dashcards" id="dashCards"></div>
    <div class="chartbox" id="chartBox"></div>
    <div class="topbox" id="topBox"></div>
  </section>
</div>
</div>

<div id="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider,
  signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ════════════════════════════════════════════════════════════════
   1) COLE AQUI AS CREDENCIAIS DO SEU PROJETO FIREBASE
   (Firebase Console → Configurações do projeto → Seus apps → Web)
   ════════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyDuZO0s7eN6RF5tpRwMuWo4g1ReOxSZqnE",
  authDomain: "despensa-andydani.firebaseapp.com",
  projectId: "despensa-andydani",
  storageBucket: "despensa-andydani.firebasestorage.app",
  messagingSenderId: "554319495618",
  appId: "1:554319495618:web:c140e08b55438426b3d65b"
};

/* ════════════════════════════════════════════════════════════════
   2) DESPENSA COMPARTILHADA
   Todos que usarem este HOUSEHOLD_ID veem a MESMA despensa.
   Deixe um código combinado entre a família, ex: "familia-silva".
   ════════════════════════════════════════════════════════════════ */
const HOUSEHOLD_ID = "minha-casa";

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const docRef = doc(db, "households", HOUSEHOLD_ID);

const DEFAULT_CATS = [
  {name:"Alimentos", ic:"🍚"},
  {name:"Limpeza", ic:"🧽"},
  {name:"Higiene", ic:"🧴"},
  {name:"Bebidas", ic:"🥤"},
  {name:"Hortifruti", ic:"🥬"},
  {name:"Outros", ic:"📦"},
];
let state={stock:[],list:[],cats:[],history:[]};
let loaded=false, unsub=null, createMode=false;

const $=id=>document.getElementById(id);
const BRL=n=>n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const parsePrice=s=>{const v=parseFloat(String(s).replace(/\./g,'').replace(',','.'));return isNaN(v)?0:v;};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function catIcon(name){const c=allCats().find(x=>x.name===name);return c?c.ic:"📦";}
function allCats(){
  const extra=(state.cats||[]).map(c=>({name:c,ic:"🏷️"}));
  const seen=new Set(DEFAULT_CATS.map(c=>c.name));
  return [...DEFAULT_CATS, ...extra.filter(c=>!seen.has(c.name))];
}

/* ---------- toast ---------- */
let toastTimer=null;
function toast(msg,alert=false){
  $('toast').querySelector('.dot').style.background=alert?'var(--red)':'var(--green)';
  $('toastMsg').textContent=msg;$('toast').classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>$('toast').classList.remove('show'),2600);
}

/* ---------- AUTH ---------- */
$('googleBtn').onclick=async()=>{
  try{await signInWithPopup(auth,new GoogleAuthProvider());}
  catch(e){$('loginErr').textContent=mapErr(e);}
};
$('toggleMode').onclick=()=>{
  createMode=!createMode;
  $('emailBtn').textContent=createMode?'Criar conta':'Entrar';
  $('toggleMode').textContent=createMode?'Já tenho conta — Entrar':'Não tem conta? Criar conta';
  $('loginErr').textContent='';
};
$('emailBtn').onclick=async()=>{
  const em=$('email').value.trim(), pw=$('pass').value;
  if(!em||pw.length<6){$('loginErr').textContent='Preencha e-mail e senha (6+ caracteres).';return;}
  try{
    if(createMode)await createUserWithEmailAndPassword(auth,em,pw);
    else await signInWithEmailAndPassword(auth,em,pw);
  }catch(e){$('loginErr').textContent=mapErr(e);}
};
$('logoutBtn').onclick=()=>signOut(auth);
function mapErr(e){
  const m={'auth/invalid-credential':'E-mail ou senha incorretos.',
    'auth/email-already-in-use':'Esse e-mail já tem conta. Faça login.',
    'auth/weak-password':'Senha muito curta (mín. 6).',
    'auth/popup-closed-by-user':'Login cancelado.',
    'auth/invalid-email':'E-mail inválido.'};
  return m[e.code]||'Erro: '+(e.code||e.message);
}

onAuthStateChanged(auth,user=>{
  if(user){
    $('login').classList.add('hidden');
    $('app').classList.remove('hidden');
    const av=$('userAv');
    if(user.photoURL)av.innerHTML=`<img src="${user.photoURL}" alt="">`;
    else av.innerHTML=`<span class="av">${(user.email||'?')[0].toUpperCase()}</span>`;
    startSync();
  }else{
    $('app').classList.add('hidden');
    $('login').classList.remove('hidden');
    if(unsub){unsub();unsub=null;}
    loaded=false;
  }
});

/* ---------- FIRESTORE SYNC ---------- */
function startSync(){
  if(unsub)unsub();
  unsub=onSnapshot(docRef,snap=>{
    if(snap.exists()){
      const d=snap.data();
      state={stock:d.stock||[],list:d.list||[],cats:d.cats||[],history:d.history||[]};
    }else{
      state={stock:[],list:[],cats:[],history:[]};
    }
    loaded=true;render();
  },err=>{toast('Erro de conexão: '+err.code,true);});
}
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await setDoc(docRef,{...state,updatedAt:Date.now()},{merge:true});}
    catch(e){toast('Erro ao salvar',true);}
  },120);
}

/* ---------- ESTOQUE ---------- */
let filter="Todos";
function addStock(name,cat){
  name=name.trim();if(!name)return;
  if(state.stock.find(p=>p.name.toLowerCase()===name.toLowerCase())){toast('Produto já existe',true);return;}
  state.stock.unshift({id:uid(),name,qty:1,min:1,cat:cat||"Outros"});
  save();render();
}
function changeQty(id,d){
  const p=state.stock.find(x=>x.id===id);if(!p)return;
  const b=p.qty;p.qty=Math.max(0,p.qty+d);
  if(b>0&&p.qty===0){autoAddToList(p.name);toast('Sem estoque de '+p.name+' — foi pra lista 🛒',true);}
  save();render();
}
function delStock(id){state.stock=state.stock.filter(x=>x.id!==id);save();render();}
function autoAddToList(name){
  if(!state.list.find(i=>i.name.toLowerCase()===name.toLowerCase()))
    state.list.unshift({id:uid(),name,done:false,auto:true,buyQty:1});
}
function addCategory(name){
  name=name.trim();if(!name)return;
  if(allCats().find(c=>c.name.toLowerCase()===name.toLowerCase())){toast('Categoria já existe',true);return;}
  state.cats=[...(state.cats||[]),name];save();render();toast('Categoria criada ✓');
}

/* ---------- LISTA ---------- */
function addListManual(name){
  name=name.trim();if(!name)return;
  if(state.list.find(i=>i.name.toLowerCase()===name.toLowerCase())){toast('Já está na lista',true);return;}
  state.list.unshift({id:uid(),name,done:false,auto:false,buyQty:1});save();render();
}
function toggleDone(id){const i=state.list.find(x=>x.id===id);if(i){i.done=!i.done;save();render();}}
function delList(id){state.list=state.list.filter(x=>x.id!==id);save();render();}
function changeBuyQty(id,d){
  const i=state.list.find(x=>x.id===id);if(!i)return;
  i.buyQty=Math.max(1,(i.buyQty||1)+d);save();render();
}
function setPrice(id,val){
  const i=state.list.find(x=>x.id===id);if(!i)return;
  i.price=parsePrice(val);save();
}
function stockQtyOf(name){
  const p=state.stock.find(x=>x.name.toLowerCase()===name.toLowerCase());
  return p?p.qty:null;
}
function lastPaidOf(name){
  const p=state.stock.find(x=>x.name.toLowerCase()===name.toLowerCase());
  return p&&p.lastPaid!=null?p.lastPaid:null;
}
function finalizarCompras(){
  const comprados=state.list.filter(i=>i.done);
  if(comprados.length===0){toast('Marque os itens comprados primeiro',true);return;}
  const total=comprados.reduce((s,i)=>s+(i.price||0),0);
  const entryItems=[];
  comprados.forEach(i=>{
    const qtd=i.buyQty||1, preco=i.price||0;
    let p=state.stock.find(x=>x.name.toLowerCase()===i.name.toLowerCase());
    if(p){ p.qty+=qtd; }
    else { p={id:uid(),name:i.name,qty:qtd,min:1,cat:"Outros"}; state.stock.unshift(p); }
    p.lastPaid=preco;
    entryItems.push({name:i.name,qty:qtd,price:preco});
  });
  state.history.unshift({
    id:uid(), date:Date.now(), total, items:entryItems
  });
  // remove os comprados da lista (zera), mantém os não comprados
  state.list=state.list.filter(i=>!i.done);
  save();render();
  toast('Compra finalizada • '+BRL(total)+' ✓');
}
function delHistory(id){
  if(!confirm('Remover esta compra do histórico? O estoque não muda.'))return;
  state.history=state.history.filter(h=>h.id!==id);save();render();
}

/* ---------- RENDER ---------- */
function render(){
  if(!loaded)return;
  $('stTotal').textContent=state.stock.length;
  $('stOut').textContent=state.stock.filter(p=>p.qty===0).length;
  const pending=state.list.filter(i=>!i.done).length;
  $('stList').textContent=pending;
  const b=$('listBadge');
  if(pending>0){b.style.display='';b.textContent=pending;}else b.style.display='none';
  renderCatSelect();renderFilters();renderStock();renderList();renderHistory();renderDash();
}
function renderCatSelect(){
  const sel=$('addCat'),cur=sel.value;
  sel.innerHTML=allCats().map(c=>`<option value="${esc(c.name)}">${c.ic} ${esc(c.name)}</option>`).join('');
  if(cur)sel.value=cur;
}
function renderFilters(){
  const used=[...new Set(state.stock.map(p=>p.cat||"Outros"))];
  const cats=["Todos",...allCats().map(c=>c.name).filter(n=>used.includes(n))];
  $('filters').innerHTML=cats.map(c=>{
    const ic=c==="Todos"?"":catIcon(c)+" ";
    return `<button class="chip ${filter===c?'active':''}" data-f="${esc(c)}">${ic}${esc(c)}</button>`;
  }).join('');
  $('filters').querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{filter=ch.dataset.f;render();});
}
function renderStock(){
  const el=$('stockList');
  if(state.stock.length===0){el.innerHTML='<div class="empty"><div class="em">📦</div><p><b>Despensa vazia</b></p><p>Adicione produtos acima para começar.</p></div>';return;}
  let items=state.stock;
  if(filter!=="Todos")items=items.filter(p=>(p.cat||"Outros")===filter);
  // agrupa por categoria
  const groups={};
  items.forEach(p=>{(groups[p.cat||"Outros"]=groups[p.cat||"Outros"]||[]).push(p);});
  const order=allCats().map(c=>c.name);
  const sortedCats=Object.keys(groups).sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  el.innerHTML=sortedCats.map(cat=>{
    const list=groups[cat].sort((a,b)=>{const s=p=>p.qty===0?0:(p.qty<=p.min?1:2);return s(a)-s(b);});
    return `<div class="catgroup"><div class="catlabel"><span class="ic">${catIcon(cat)}</span>${esc(cat)}</div>${
      list.map(p=>cardStock(p)).join('')}</div>`;
  }).join('');
}
function cardStock(p){
  const isOut=p.qty===0,isLow=p.qty>0&&p.qty<=p.min;
  const cls=isOut?'out':(isLow?'low':'');
  const pill=isOut?'<span class="pill out">Sem estoque</span>':(isLow?'<span class="pill low">Acabando</span>':'');
  return `<div class="card ${cls}">
    <div class="info"><div class="name">${esc(p.name)} ${pill}</div><div class="meta">${p.qty} em estoque</div></div>
    <div class="qty">
      <button class="qbtn minus" data-act="minus" data-id="${p.id}">−</button>
      <span class="qnum">${p.qty}</span>
      <button class="qbtn plus" data-act="plus" data-id="${p.id}">+</button>
    </div>
    <button class="del" data-act="delS" data-id="${p.id}">✕</button></div>`;
}
function renderList(){
  const el=$('shopList');
  const fin=$('finishBtn');
  if(state.list.length===0){
    el.innerHTML='<div class="empty"><div class="em">🛒</div><p><b>Lista vazia</b></p><p>Itens entram aqui sozinhos quando o estoque zera.</p></div>';
    fin.style.display='none';return;
  }
  const sorted=[...state.list].sort((a,b)=>a.done-b.done);
  el.innerHTML=sorted.map(i=>{
    const buy=i.buyQty||1;
    const est=stockQtyOf(i.name);
    const last=lastPaidOf(i.name);
    const estTxt=est!=null?`${est} em estoque`:'novo produto';
    const lastTag=last!=null?`<span class="lastpaid">último: ${BRL(last)}</span>`:'';
    const priceVal=i.price!=null&&i.price>0?String(i.price).replace('.',','):'';
    return `
    <div class="card listcard checkitem ${i.done?'done':''}">
      <div class="toprow2">
        <div class="check" data-act="toggle" data-id="${i.id}">${i.done?'✓':''}</div>
        <div class="info" data-act="toggle" data-id="${i.id}">
          <div class="name">${esc(i.name)} ${i.auto?'<span class="auto-tag">acabou</span>':''} ${lastTag}</div>
          <div class="meta">comprar ${buy} • ${estTxt}</div>
        </div>
        <div class="qty">
          <button class="qbtn minus" data-act="buyMinus" data-id="${i.id}">−</button>
          <span class="qnum">${buy}</span>
          <button class="qbtn plus" data-act="buyPlus" data-id="${i.id}">+</button>
        </div>
        <button class="del" data-act="delL" data-id="${i.id}">✕</button>
      </div>
      <div class="price-row">
        <span class="lbl">R$</span>
        <input class="price-in" type="text" inputmode="decimal" placeholder="valor total pago"
          value="${priceVal}" data-price-id="${i.id}">
      </div>
    </div>`;
  }).join('');
  // ligar inputs de preço
  el.querySelectorAll('[data-price-id]').forEach(inp=>{
    inp.addEventListener('change',()=>setPrice(inp.dataset.priceId,inp.value));
  });
  // botão finalizar: só aparece se houver itens marcados
  const comprados=state.list.filter(i=>i.done);
  if(comprados.length>0){
    const tot=comprados.reduce((s,i)=>s+(i.price||0),0);
    fin.style.display='block';
    fin.innerHTML=`✓ Finalizar compras de hoje<br><span class="sum">${comprados.length} ${comprados.length>1?'itens':'item'} • ${BRL(tot)}</span>`;
  }else fin.style.display='none';
}

function renderHistory(){
  const el=$('histList');
  const tot=$('histTotal');
  if(!state.history||state.history.length===0){
    tot.innerHTML='';
    el.innerHTML='<div class="empty"><div class="em">🧾</div><p><b>Sem compras ainda</b></p><p>Finalize uma compra na aba 🛒 para registrar aqui.</p></div>';
    return;
  }
  const geral=state.history.reduce((s,h)=>s+(h.total||0),0);
  tot.innerHTML=`<div class="big">${BRL(geral)}</div><div class="lbl">Total gasto • ${state.history.length} ${state.history.length>1?'compras':'compra'}</div>`;

  // agrupa por mês/ano preservando a ordem (history já vem do mais recente)
  const months=[];
  const idx={};
  state.history.forEach(h=>{
    const d=new Date(h.date);
    const key=d.getFullYear()+'-'+d.getMonth();
    if(idx[key]==null){
      idx[key]=months.length;
      const label=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      months.push({label:label.charAt(0).toUpperCase()+label.slice(1),total:0,buys:[]});
    }
    const m=months[idx[key]];
    m.total+=h.total||0;
    m.buys.push(h);
  });

  el.innerHTML=months.map(m=>{
    const cards=m.buys.map(h=>{
      const d=new Date(h.date);
      const ds=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})+
        ' • '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const its=h.items.map(it=>`<div class="it"><span>${esc(it.name)} ×${it.qty}</span><span>${BRL(it.price||0)}</span></div>`).join('');
      return `<div class="histcard">
        <div class="hh"><span class="date">${ds}</span><span class="tot">${BRL(h.total||0)}</span></div>
        <div class="items">${its}</div>
        <button class="delh" data-act="delH" data-id="${h.id}">remover do histórico</button>
      </div>`;
    }).join('');
    return `<div class="monthhead"><span>${esc(m.label)}</span><span class="msum">${BRL(m.total)}</span></div>${cards}`;
  }).join('');
}

function monthlyTotals(){
  // retorna array cronológico (antigo -> recente) de {label, key, total}
  const map={};const order=[];
  state.history.forEach(h=>{
    const d=new Date(h.date);
    const key=d.getFullYear()+'-'+String(d.getMonth()).padStart(2,'0');
    if(map[key]==null){
      map[key]={key,total:0,
        label:d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','')+'/'+String(d.getFullYear()).slice(2)};
      order.push(key);
    }
    map[key].total+=h.total||0;
  });
  order.sort();
  return order.map(k=>map[k]);
}

function renderDash(){
  const cardsEl=$('dashCards'), chartEl=$('chartBox'), topEl=$('topBox');
  if(!state.history||state.history.length===0){
    cardsEl.innerHTML='';topEl.innerHTML='';
    chartEl.innerHTML='<div class="empty"><div class="em">📊</div><p><b>Sem dados ainda</b></p><p>Finalize compras para ver a evolução dos gastos aqui.</p></div>';
    return;
  }
  const months=monthlyTotals();
  const geral=months.reduce((s,m)=>s+m.total,0);
  const media=geral/months.length;
  const atual=months[months.length-1];
  const anterior=months.length>1?months[months.length-2]:null;

  // tendência mês atual vs anterior
  let trend='';
  if(anterior&&anterior.total>0){
    const diff=((atual.total-anterior.total)/anterior.total)*100;
    const cls=diff>1?'up':(diff<-1?'down':'flat');
    const arrow=diff>1?'▲':(diff<-1?'▼':'■');
    trend=`<div class="trend ${cls}">${arrow} ${Math.abs(diff).toFixed(0)}% vs mês anterior</div>`;
  }

  cardsEl.innerHTML=`
    <div class="dc accent"><div class="v">${BRL(geral)}</div><div class="k">Total gasto</div></div>
    <div class="dc"><div class="v">${BRL(media)}</div><div class="k">Média / mês</div></div>
    <div class="dc"><div class="v">${BRL(atual.total)}</div><div class="k">Este mês</div>${trend}</div>`;

  // gráfico: últimos 12 meses
  const last=months.slice(-12);
  const max=Math.max(...last.map(m=>m.total),1);
  const bars=last.map((m,idx)=>{
    const h=Math.round((m.total/max)*140)+3;
    const isCur=idx===last.length-1;
    return `<div class="bar-col">
      <div class="bar-val">${m.total>=1000?(m.total/1000).toFixed(1)+'k':Math.round(m.total)}</div>
      <div class="bar ${isCur?'cur':''}" style="height:${h}px" title="${BRL(m.total)}"></div>
      <div class="bar-lbl">${m.label}</div>
    </div>`;
  }).join('');
  chartEl.innerHTML=`<h3>Evolução dos gastos</h3><div class="chart">${bars}</div>`;

  // ranking de produtos por gasto acumulado
  const prod={};
  state.history.forEach(h=>h.items.forEach(it=>{
    prod[it.name]=(prod[it.name]||0)+(it.price||0);
  }));
  const ranking=Object.entries(prod).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(ranking.length){
    topEl.innerHTML=`<h3>Onde você mais gasta</h3>`+ranking.map((r,i)=>
      `<div class="toprow3"><span class="rank">${i+1}</span><span class="pname">${esc(r[0])}</span><span class="pval">${BRL(r[1])}</span></div>`
    ).join('');
  }else topEl.innerHTML='';
}

/* ---------- delegação de eventos ---------- */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]');if(!t)return;
  const id=t.dataset.id,act=t.dataset.act;
  if(act==='minus')changeQty(id,-1);
  else if(act==='plus')changeQty(id,1);
  else if(act==='delS')delStock(id);
  else if(act==='delL'){e.stopPropagation();delList(id);}
  else if(act==='buyMinus')changeBuyQty(id,-1);
  else if(act==='buyPlus')changeBuyQty(id,1);
  else if(act==='toggle')toggleDone(id);
  else if(act==='delH')delHistory(id);
});

$('addBtn').onclick=()=>{addStock($('addName').value,$('addCat').value);$('addName').value='';$('addName').focus();};
$('addName').addEventListener('keydown',e=>{if(e.key==='Enter'){addStock(e.target.value,$('addCat').value);e.target.value='';}});
$('newCatBtn').onclick=()=>{addCategory($('newCat').value);$('newCat').value='';};
$('newCat').addEventListener('keydown',e=>{if(e.key==='Enter'){addCategory(e.target.value);e.target.value='';}});
$('addListBtn').onclick=()=>{addListManual($('addListName').value);$('addListName').value='';$('addListName').focus();};
$('addListName').addEventListener('keydown',e=>{if(e.key==='Enter'){addListManual(e.target.value);e.target.value='';}});
$('finishBtn').onclick=finalizarCompras;
const PANELS={stock:'panelStock',list:'panelList',hist:'panelHist',dash:'panelDash'};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('show'));
  t.classList.add('active');
  $(PANELS[t.dataset.tab]).classList.add('show');
});
</script>
